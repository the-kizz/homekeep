<!DOCTYPE html>
<!-- HomeKeep offline page — github.com/conroyke56/homekeep — hk-1b6f3c0e-homekeep-public -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — HomeKeep</title>
    <meta name="theme-color" content="#D4A574" />
    <link rel="icon" href="/icons/icon-192.png" />
    <style>
      /* Static, zero-network warm offline fallback. Palette matches
         app/globals.css :root (#F5EEE0 bg-ish + #25150F fg) so it
         doesn't jar against the installed PWA's splash screen. */
      html,
      body {
        margin: 0;
        padding: 0;
        min-height: 100%;
        background-color: #f5eee0;
        color: #25150f;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        box-sizing: border-box;
      }
      main {
        max-width: 32rem;
        background-color: #ffffff;
        border: 1px solid rgba(37, 21, 15, 0.12);
        border-radius: 0.75rem;
        padding: 2rem 1.75rem;
        box-shadow: 0 1px 2px rgba(37, 21, 15, 0.04);
      }
      .brand {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.875rem;
        font-weight: 600;
        color: #d4a574;
        letter-spacing: 0.02em;
        margin-bottom: 1rem;
        text-transform: uppercase;
      }
      h1 {
        font-size: 1.75rem;
        line-height: 1.2;
        margin: 0 0 0.75rem 0;
      }
      p {
        font-size: 1rem;
        line-height: 1.5;
        margin: 0 0 0.5rem 0;
        color: rgba(37, 21, 15, 0.75);
      }
      .hint {
        margin-top: 1.25rem;
        font-size: 0.875rem;
        color: rgba(37, 21, 15, 0.55);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">HomeKeep</div>
      <h1>You're offline</h1>
      <p>Reconnect to see updates. HomeKeep keeps your data on your home server — nothing is lost.</p>
      <p class="hint">Pages you've already visited will load again once the network returns.</p>
    </main>
  </body>
</html>
