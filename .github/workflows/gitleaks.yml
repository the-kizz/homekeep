name: gitleaks

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          VERSION="8.30.1"
          curl -sL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" | tar xz
          sudo install -m 755 gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan
        run: gitleaks detect --source . --redact -v --exit-code 1
