name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write
  id-token: write  # OIDC token for cosign keyless signing (SUPPLY-01)

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # Take manual control of :latest so it only applies to stable tags.
          flavor: |
            latest=false
          tags: |
            # Exact version: v1.0.0 -> 1.0.0, v1.0.0-rc1 -> 1.0.0-rc1
            type=semver,pattern={{version}}
            # Minor pin (stable only): v1.2.3 -> 1.2; RC tags skipped via match-prefix
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref_name, '-') }}
            # Major pin (stable only): v1.2.3 -> 1
            type=semver,pattern={{major}},enable=${{ !contains(github.ref_name, '-') }}
            # :latest only for stable releases (no -rc / -beta / -alpha suffix)
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
            # :rc channel auto-updates to the most recent release candidate
            type=raw,value=rc,enable=${{ contains(github.ref_name, '-rc') }}
            # :beta channel auto-updates to the most recent beta
            type=raw,value=beta,enable=${{ contains(github.ref_name, '-beta') }}

      - name: Build and push multi-arch
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PB_VERSION=0.37.1
            S6_OVERLAY_VERSION=3.2.2.0
            HK_BUILD_ID=hk-${{ github.sha }}

      # SUPPLY-01: Cosign keyless signing via GitHub OIDC.
      # Signature is bound to workflow identity (repo + branch + workflow),
      # no long-lived keys to manage. Verify with:
      #   cosign verify ghcr.io/conroyke56/homekeep:<tag> \
      #     --certificate-identity-regexp "^https://github.com/conroyke56/homekeep/.github/workflows/release.yml@.+" \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign image with cosign
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "ghcr.io/${{ github.repository }}@${DIGEST}"

      - name: Verify multi-arch manifest
        # Use the semver-stripped tag from metadata-action (e.g. '1.0.0-rc1', not 'v1.0.0-rc1').
        run: sh scripts/check-multiarch.sh ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}
