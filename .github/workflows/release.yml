name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write  # create GitHub Release on tag push (v1.2.1 follow-up)
  packages: write
  id-token: write  # OIDC token for cosign keyless signing (SUPPLY-01)

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ghcr.io/${{ github.repository }}
          # Take manual control of :latest so it only applies to stable tags.
          flavor: |
            latest=false
          tags: |
            # Exact version: v1.0.0 -> 1.0.0, v1.0.0-rc1 -> 1.0.0-rc1
            type=semver,pattern={{version}}
            # Minor pin (stable only): v1.2.3 -> 1.2; RC tags skipped via match-prefix
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref_name, '-') }}
            # Major pin (stable only): v1.2.3 -> 1
            type=semver,pattern={{major}},enable=${{ !contains(github.ref_name, '-') }}
            # :latest only for stable releases (no -rc / -beta / -alpha suffix)
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
            # :rc channel auto-updates to the most recent release candidate
            type=raw,value=rc,enable=${{ contains(github.ref_name, '-rc') }}
            # :beta channel auto-updates to the most recent beta
            type=raw,value=beta,enable=${{ contains(github.ref_name, '-beta') }}

      - name: Build and push multi-arch
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # SUPPLY-02: BuildKit emits SPDX SBOM + SLSA-3 provenance as OCI
          # attestations on the pushed manifest. Inspect with:
          #   docker buildx imagetools inspect <image> --format '{{ json .SBOM }}'
          #   docker buildx imagetools inspect <image> --format '{{ json .Provenance }}'
          sbom: true
          provenance: mode=max
          build-args: |
            PB_VERSION=0.37.1
            S6_OVERLAY_VERSION=3.2.2.0
            HK_BUILD_ID=hk-${{ github.sha }}

      # SUPPLY-01: Cosign keyless signing via GitHub OIDC.
      # Signature is bound to workflow identity (repo + branch + workflow),
      # no long-lived keys to manage. Verify with:
      #   cosign verify ghcr.io/the-kizz/homekeep:<tag> \
      #     --certificate-identity-regexp "^https://github.com/the-kizz/homekeep/.github/workflows/release.yml@.+" \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com
      - name: Install cosign
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1
      - name: Sign image with cosign
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "ghcr.io/${{ github.repository }}@${DIGEST}"

      - name: Verify multi-arch manifest
        # Use the semver-stripped tag from metadata-action (e.g. '1.0.0-rc1', not 'v1.0.0-rc1').
        run: sh scripts/check-multiarch.sh ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}

      # v1.2.1 follow-up: auto-create a GitHub Release for every pushed
      # tag. Prior workflow published images + SBOM + provenance but never
      # created the Release object, so the Releases page still listed
      # v1.0.0 as Latest even after v1.1.x and v1.2.0 shipped. The git tag
      # annotation becomes the release body (falls back to a default body
      # on lightweight tags).
      #
      # `-rc` / `-beta` / `-alpha` tags are flagged prerelease so they
      # don't steal the "Latest" badge from the most recent stable.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: ${{ !contains(github.ref_name, '-') && 'true' || 'false' }}
          body: |
            Multi-arch image (`linux/amd64`, `linux/arm64`) published to GHCR:
            `ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}`

            Supply-chain attestations:
            - **Cosign signature** (keyless, GitHub OIDC — see SUPPLY-01)
            - **SBOM** (SPDX, OCI attestation on manifest)
            - **SLSA-3 provenance** (mode=max)

            See `SECURITY.md` and `docs/deployment-hardening.md` for verification and operator guidance.
