name: Edge

# Publishes the bleeding-edge image from every push to master.
# Tag: ghcr.io/<owner>/<repo>:edge
#
# This is the equivalent of Grafana's :main, Caddy's :edge, or Traefik's :experimental.
# Not production-recommended — use :latest (stable) or a version pin instead.

on:
  push:
    branches: [master, main]

permissions:
  contents: read
  packages: write

concurrency:
  group: edge-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push-edge:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push :edge (multi-arch)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:edge
            ghcr.io/${{ github.repository }}:edge-${{ github.sha }}
          cache-from: type=gha,scope=edge
          cache-to: type=gha,mode=max,scope=edge
          build-args: |
            PB_VERSION=0.37.1
            S6_OVERLAY_VERSION=3.2.2.0
            HK_BUILD_ID=hk-edge-${{ github.sha }}
