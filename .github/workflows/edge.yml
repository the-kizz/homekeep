name: Edge

# Publishes the bleeding-edge image from every push to master.
# Tag: ghcr.io/<owner>/<repo>:edge
#
# This is the equivalent of Grafana's :main, Caddy's :edge, or Traefik's :experimental.
# Not production-recommended — use :latest (stable) or a version pin instead.

on:
  push:
    branches: [master, main]

permissions:
  contents: read
  packages: write

concurrency:
  group: edge-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push-edge:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push :edge (multi-arch)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:edge
            ghcr.io/${{ github.repository }}:edge-${{ github.sha }}
          cache-from: type=gha,scope=edge
          cache-to: type=gha,mode=max,scope=edge
          # SUPPLY-02: SBOM + SLSA-3 provenance on edge images too.
          sbom: true
          provenance: mode=max
          build-args: |
            PB_VERSION=0.37.1
            S6_OVERLAY_VERSION=3.2.2.0
            HK_BUILD_ID=hk-edge-${{ github.sha }}
